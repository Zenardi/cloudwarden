      - name: Smoke-test team-scoped multi-tenancy (M11.2)
        run: |
          set -euo pipefail
          # In the deployed image against the real DB, with RBAC ON (in-process
          # TestClient in an exec'd subprocess so the live server is untouched):
          # a member's create assigns their team as owner; listing is team-scoped
          # (member sees only their team, admin sees all); a non-admin reaching
          # another team is 403; and removing a member revokes their access.
          docker compose exec -T -e RBAC_ENABLED=1 backend python - <<'PY'
          from fastapi.testclient import TestClient
          from azure_finops.api.main import app
          from azure_finops.authz import rbac
          from azure_finops.storage import repository as repo
          from azure_finops.storage.db import session_scope

          with session_scope() as s:
              rbac.seed_default_roles(s, bootstrap_admin="ci-team-admin")
              repo.assign_role(s, principal="ci-alice", role_name="editor")
              repo.assign_role(s, principal="ci-bob", role_name="editor")
              alpha = repo.create_team(s, name="ci-alpha")["id"]
              beta = repo.create_team(s, name="ci-beta")["id"]
              repo.add_team_member(s, team_id=alpha, principal="ci-alice")
              repo.add_team_member(s, team_id=beta, principal="ci-bob")

          c = TestClient(app)

          def mk(name, who):
              body = {"name": name, "resource_type": "azure.vm",
                      "spec": {"policies": [{"name": name, "resource": "azure.vm"}]}}
              return c.post("/api/policies", json=body, headers={"X-Principal": who})

          a = mk("ci-alpha-p", "ci-alice")
          b = mk("ci-beta-p", "ci-bob")
          assert a.status_code == 201 and a.json()["team_id"] == alpha, a.json()
          assert b.status_code == 201 and b.json()["team_id"] == beta, b.json()

          alice_names = {p["name"] for p in c.get("/api/policies", headers={"X-Principal": "ci-alice"}).json()}
          admin_names = {p["name"] for p in c.get("/api/policies", headers={"X-Principal": "ci-team-admin"}).json()}
          assert "ci-alpha-p" in alice_names and "ci-beta-p" not in alice_names, alice_names
          assert {"ci-alpha-p", "ci-beta-p"} <= admin_names, admin_names

          cross = c.get(f"/api/policies/{b.json()['id']}", headers={"X-Principal": "ci-alice"})
          assert cross.status_code == 403, cross.status_code

          removed = c.request("DELETE", f"/api/teams/{beta}/members/ci-bob",
                              headers={"X-Principal": "ci-team-admin"})
          assert removed.status_code == 200, removed.status_code
          bob_names = {p["name"] for p in c.get("/api/policies", headers={"X-Principal": "ci-bob"}).json()}
          assert "ci-beta-p" not in bob_names, bob_names
          print("team-scope OK: create-owns=team list=scoped cross-team=403 remove-member=revoked")
          PY

      - name: Smoke-test SSO / OIDC authentication (M11.3)
        run: |
          set -euo pipefail
          # (1) On the LIVE server (OIDC off — the compose default) the auth routes 404.
          docker compose exec -T backend python - <<'PY'
          import urllib.error, urllib.request
          for path in ("/api/auth/login", "/api/auth/callback?code=x"):
              try:
                  urllib.request.urlopen(f"http://localhost:8000{path}")
                  raise SystemExit(f"expected 404 for {path}")
              except urllib.error.HTTPError as e:
                  assert e.code == 404, (path, e.code)
          print("oidc-off OK: auth routes 404")
          PY
          # (2) With OIDC ON (in-process TestClient, real RS256 via a generated keypair,
          #     no IdP contacted): a valid bearer's subject flows into RBAC (201), an
          #     expired token is 401, and the callback issues a session cookie.
          docker compose exec -T backend python - <<'PY'
          import os, time
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric import rsa

          key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
          priv = key.private_bytes(serialization.Encoding.PEM,
              serialization.PrivateFormat.PKCS8, serialization.NoEncryption()).decode()
          pub = key.public_key().public_bytes(serialization.Encoding.PEM,
              serialization.PublicFormat.SubjectPublicKeyInfo).decode()
          ISS, CID = "https://idp.ci", "finops-ci"
          os.environ.update(OIDC_ENABLED="1", RBAC_ENABLED="1", OIDC_ISSUER=ISS,
              OIDC_CLIENT_ID=CID, OIDC_PUBLIC_KEY=pub,
              SESSION_SECRET="ci-session-secret-0123456789abcdef")

          import jwt
          from azure_finops.config import get_settings
          get_settings.cache_clear()
          from fastapi.testclient import TestClient
          from azure_finops.api.main import app, get_oidc_client, get_token_verifier
          from azure_finops.authz import oidc, rbac
          from azure_finops.storage import repository as repo
          from azure_finops.storage.db import session_scope

          def tok(sub="ci-admin@corp", exp_delta=3600):
              now = int(time.time())
              return jwt.encode({"sub": sub, "iss": ISS, "aud": CID, "iat": now,
                                 "exp": now + exp_delta}, priv, algorithm="RS256")

          with session_scope() as s:
              rbac.seed_default_roles(s)
              repo.assign_role(s, principal="ci-admin@corp", role_name="admin")

          c = TestClient(app)
          body = {"name": "oidc-ci-p", "resource_type": "azure.vm",
                  "spec": {"policies": [{"name": "oidc-ci-p", "resource": "azure.vm"}]}}
          assert c.post("/api/policies", json=body,
                        headers={"Authorization": f"Bearer {tok()}"}).status_code == 201
          assert c.post("/api/policies", json=body,
                        headers={"Authorization": f"Bearer {tok(exp_delta=-10)}"}).status_code == 401

          class Fake:
              def authorization_url(self, *, state):
                  return f"{ISS}/authorize?state={state}"

              def exchange_code(self, *, code):
                  if code != "good":
                      raise ValueError("bad code")
                  return tok("ci-user@corp")

          app.dependency_overrides[get_oidc_client] = lambda: Fake()
          app.dependency_overrides[get_token_verifier] = lambda: oidc.StaticKeyVerifier(
              public_key=pub, issuer=ISS, audience=CID)
          cb = c.get("/api/auth/callback", params={"code": "good", "state": "s"})
          assert cb.status_code == 200 and cb.json()["principal"] == "ci-user@corp", cb.text
          assert oidc.SESSION_COOKIE in cb.cookies
          print("oidc-on OK: bearer->rbac=201 expired=401 callback=session")
          PY

      - name: Smoke-test the audit log (M11.4)
        run: |
          set -euo pipefail
          # In the deployed image against the real DB: a policy create/update/delete
          # each writes an append-only audit row (actor + before/after); reads add
          # nothing; the log is newest-first and filterable; and mutating verbs on
          # /api/audit are 405 (append-only).
          docker compose exec -T backend python - <<'PY'
          import json, urllib.error, urllib.request

          def call(method, path, body=None, actor=None):
              headers = {"Content-Type": "application/json"}
              if actor:
                  headers["X-Principal"] = actor
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(f"http://localhost:8000{path}", data=data,
                                           headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.load(r)
              except urllib.error.HTTPError as e:
                  return e.code, None

          spec = {"policies": [{"name": "ci-audit-p", "resource": "azure.vm"}]}
          st, created = call("POST", "/api/policies",
                             {"name": "ci-audit-p", "resource_type": "azure.vm", "spec": spec},
                             actor="ci-auditor")
          assert st == 201, st
          pid = created["id"]
          assert call("PUT", f"/api/policies/{pid}", {"description": "d2"}, actor="ci-auditor")[0] == 200
          # A read — must NOT be audited.
          call("GET", f"/api/policies/{pid}")
          assert call("DELETE", f"/api/policies/{pid}", actor="ci-auditor")[0] == 200

          st, rows = call("GET", f"/api/audit?target_id={pid}")
          assert st == 200, st
          actions = [r["action"] for r in rows]
          assert actions == ["policy.delete", "policy.update", "policy.create"], actions  # newest-first
          assert all(r["actor"] == "ci-auditor" for r in rows), rows
          assert rows[0]["before"]["name"] == "ci-audit-p"       # delete captured prior state
          assert rows[2]["before"] == {}                          # create has no prior state

          # Append-only: no mutating routes on /api/audit.
          assert call("POST", "/api/audit", {})[0] == 405
          assert call("DELETE", "/api/audit")[0] == 405
          print("audit OK: create/update/delete recorded, reads ignored, newest-first, append-only")
          PY

      - name: Smoke-test the cloud provider abstraction (M12.1)
        run: |
          set -euo pipefail
          # In the deployed image: the provider registry resolves azure (and rejects
          # an unknown cloud); a run still works through the Azure provider's context;
          # and a newly-onboarded account defaults its `provider` to azure while an
          # explicit provider is honoured. Uses a UNIQUELY-NAMED account (shared DB).
          docker compose exec -T backend python - <<'PY'
          import json, urllib.error, urllib.request

          from azure_finops.providers import base, registry

          # Registry resolves azure and fails loudly on an unknown cloud.
          azure = registry.get("azure")
          assert azure.name == "azure" and isinstance(azure, base.CloudProvider)
          try:
              registry.get("gcp")
              raise AssertionError("expected UnknownProviderError")
          except registry.UnknownProviderError:
              pass

          # A run still works when its context is built via the Azure provider.
          from azure_finops.orchestrator import run_pipeline
          out = run_pipeline(mock=True, subscription=azure.account_context(account_id="m121-ci"))
          assert out["subscription_id"] == "m121-ci" and out["counts"]["resources"] > 0, out

          # Onboarding an account defaults provider=azure over the API …
          def post_account(body):
              req = urllib.request.Request(
                  "http://localhost:8000/api/subscriptions",
                  data=json.dumps(body).encode(),
                  headers={"Content-Type": "application/json"}, method="POST")
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          acc = post_account({"subscription_id": "m121-acct", "display_name": "M12.1 acct"})
          assert acc["provider"] == "azure", acc
          # … and honours an explicit provider (column is cloud-agnostic).
          aws = post_account({"subscription_id": "m121-aws", "display_name": "M12.1 aws",
                              "provider": "aws"})
          assert aws["provider"] == "aws", aws
          print("provider OK: registry resolves azure, unknown=error, run works, provider column defaults azure")
          PY

      - name: Smoke-test AWS onboarding & execution (M12.2)
        run: |
          set -euo pipefail
          # In the deployed image, against the real DB: onboard an AWS account with an
          # INJECTED STS client (no live AWS), verify it is stored provider='aws', a bad
          # credential is rejected 400, a c7n aws policy dry-run matches fixture ec2
          # resources, and ingestion writes AssetDB rows tagged provider='aws'.
          docker compose exec -T backend python - <<'PY'
          import json, urllib.error, urllib.request

          from fastapi.testclient import TestClient

          from azure_finops.api.main import app, get_aws_sts_client

          class _Sts:
              def __init__(self, account): self.account = account
              def get_caller_identity(self):
                  return {"Account": self.account, "Arn": f"arn:aws:iam::{self.account}:role/finops",
                          "UserId": "AROACI:finops"}

          class _Boom:
              def get_caller_identity(self): raise RuntimeError("invalid token")

          ACC = "210987654321"
          # Onboard (injected good STS) → 201, provider='aws'.
          app.dependency_overrides[get_aws_sts_client] = lambda: _Sts(ACC)
          with TestClient(app) as c:
              r = c.post("/api/aws/accounts", json={"account_id": ACC, "display_name": "CI AWS"})
              assert r.status_code == 201, r.text
              assert r.json()["account"]["provider"] == "aws", r.text
              # A bad credential is rejected.
              app.dependency_overrides[get_aws_sts_client] = lambda: _Boom()
              bad = c.post("/api/aws/accounts", json={"account_id": ACC, "display_name": "x"})
              assert bad.status_code == 400, bad.text
              # Policy dry-run matches fixture ec2 resources.
              dry = c.post("/api/aws/policies/dryrun", json={"account_id": ACC,
                    "spec": {"policies": [{"name": "ec2", "resource": "aws.ec2"}]}}).json()
              assert dry["matched"] > 0 and all(x["type"] == "aws.ec2" for x in dry["resources"]), dry
              # Ingest → AssetDB rows tagged provider='aws'.
              ing = c.post(f"/api/aws/accounts/{ACC}/ingest").json()
              assert ing["provider"] == "aws" and ing["assets"] > 0, ing
              rows = c.post("/api/assets/query",
                            json={"filters": [{"column": "provider", "op": "eq", "value": "aws"}]}).json()
              assert rows and all(row["provider"] == "aws" for row in rows), rows
          app.dependency_overrides.clear()
          print("aws OK: onboard(provider=aws) bad-cred=400 dryrun=matches ingest=assetdb(provider=aws)")
          PY

      - name: Assert UI routes render (assets M4.5 + account groups M5.1 + bindings M5.4 + events M6.4, mock mode)
        run: |
          set -euo pipefail
          # Wait for the Next.js server, then assert the explorer + a detail route
          # (catch-all id) and the account-groups page all return 200. Full Azure ids
          # contain slashes, so the detail route is /assets/<subscriptions/.../vm-web-01>.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/assets || true)
            if [ "$code" = "200" ]; then echo "frontend ready after ~$((i*2))s"; break; fi
            sleep 2
          done
          detail="/assets/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/rg-app/providers/microsoft.compute/virtualmachines/vm-web-01"
          for path in "/assets" "$detail" "/account-groups" "/bindings" "/events" "/remediation" "/notifications" "/compliance" "/audit"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3001$path")
            test "$code" = "200" || { echo "::error::$path returned $code"; docker compose logs frontend; exit 1; }
            echo "route OK: $path → 200"
          done
      - name: Tear down
        if: always()
        run: docker compose down -v

  # --- Security: Trivy fs + image scans. Fails on any ACTIONABLE HIGH/CRITICAL #
  # No baseline / .trivyignore (no specific CVEs are waived). `--ignore-unfixed`
  # scopes the gate to vulnerabilities that HAVE an available fix: a single fixable
  # HIGH/CRITICAL blocks the build, while CVEs with no upstream patch (e.g. Debian
  # Essential packages perl-base / util-linux / ncurses, which can be neither
  # patched nor removed) don't fail a build nothing can act on. Everything fixable
  # is actually fixed (see backend/frontend Dockerfiles + requirements.txt).
  security:
    name: Security (Trivy — fail on any fixable HIGH/CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.72.0
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -C /usr/local/bin -xzf - trivy
          trivy --version
      - name: Build images to scan
        run: |
          docker build -t azure-finops-backend ./backend
          docker build -t azure-finops-frontend ./frontend
      # Warm the vuln DB once; subsequent scans reuse the cache.
      - name: Trivy filesystem scan (dependencies)
        run: |
          trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress .
      - name: Trivy image scan (backend)
        run: |
          trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress azure-finops-backend
      - name: Trivy image scan (frontend)
        run: |
          trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress azure-finops-frontend
