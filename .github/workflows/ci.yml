name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Lint + unit & DB-backed integration tests + coverage gate ----------- #
  backend:
    name: Backend (lint + unit/integration tests + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          # Apply the same c7n CVE overrides the image ships (issue #58), so the test
          # suite validates the cryptography/PyJWT versions we actually run.
          pip install --no-deps --upgrade -r backend/requirements-overrides-security.txt
      - name: Ruff (lint + format check)
        run: |
          ruff check backend
          ruff format --check backend
      # Docker is available on ubuntu-latest, so the testcontainers `db` fixture
      # spins up a real Postgres — this run covers unit AND DB-backed integration
      # tests. Coverage gate (fail_under=95) is enforced via pyproject.
      - name: Tests + coverage (unit + integration; fails under 95%)
        run: pytest backend/tests --cov=azure_finops --cov-report=term-missing

  # --- Build the Next.js app (tsc typecheck via next build) ---------------- #
  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build Next.js app
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # --- Build the whole solution as container images ------------------------ #
  build:
    name: Build images (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t azure-finops-backend ./backend
      - name: Build frontend image
        run: docker build -t azure-finops-frontend ./frontend

  # --- End-to-end: boot the stack in mock mode and smoke-test the API ------ #
  e2e:
    name: End-to-end (docker compose, mock mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env (mock mode)
        run: cp .env.example .env
      - name: Build backend + frontend images
        run: docker compose build backend frontend
      - name: Start stack (db + backend + frontend)
        run: docker compose up -d db backend frontend
      - name: Wait for the API to be ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)
            if [ "$code" = "200" ]; then echo "backend ready after ~$((i*2))s"; exit 0; fi
            sleep 2
          done
          echo "::error::backend did not become ready"; docker compose logs backend; exit 1
      - name: Smoke-test the pull-mode pipeline end to end
        run: |
          set -euo pipefail
          # No executions yet -> empty list (not an error).
          test "$(curl -s http://localhost:8000/api/policy-executions)" = "[]"
          # Seed a policy, then run pull-mode execution.
          curl -sf -X POST http://localhost:8000/api/policies \
            -H 'Content-Type: application/json' \
            -d '{"name":"e2e-vms","resource_type":"azure.vm","spec":{"policies":[{"name":"e2e-vms","resource":"azure.vm","actions":["stop"]}]}}' \
            -o /dev/null
          docker compose exec -T backend python -m azure_finops.cli run-policies --mock
          python3 - <<'PY'
          import json, urllib.request, urllib.error
          def get(path):
              return json.load(urllib.request.urlopen(f"http://localhost:8000{path}"))
          execs = get("/api/policy-executions")
          assert execs and execs[0]["status"] == "succeeded", execs
          matches = get(f"/api/policy-executions/{execs[0]['execution_id']}/matches")
          assert matches, "expected matched resources"
          # Governance health (M3.4) — assert only if the endpoint is present on this ref.
          try:
              health = get("/api/governance/policy-health")
              assert health and health[0]["total_executions"] >= 1, health
              extra = f", health total_matches={health[0]['total_matches']}"
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              extra = " (governance/policy-health absent on this ref)"
          print(f"e2e OK: {len(execs)} execution(s), {len(matches)} match(es){extra}")
          PY
      - name: Smoke-test event-mode enforcement end to end (M6.2)
        run: |
          set -euo pipefail
          # Seed an EVENT-MODE VM policy (declares a mode block), then deliver an
          # Event Grid ResourceWriteSuccess for a VM and assert it reactively fired.
          curl -sf -X POST http://localhost:8000/api/policies \
            -H 'Content-Type: application/json' \
            -d '{"name":"e2e-event-vms","resource_type":"azure.vm","spec":{"policies":[{"name":"e2e-event-vms","resource":"azure.vm","mode":{"type":"azure-event-grid","events":["Microsoft.Compute/virtualMachines/write"]},"actions":["stop"]}]}}' \
            -o /dev/null
          sub="00000000-0000-0000-0000-000000000000"
          uri="/subscriptions/$sub/resourceGroups/rg-app/providers/Microsoft.Compute/virtualMachines/vm-web-01"
          curl -sf -X POST http://localhost:8000/api/events/azure \
            -H 'Content-Type: application/json' \
            -d "[{\"id\":\"e2e-evt-1\",\"eventType\":\"Microsoft.Resources.ResourceWriteSuccess\",\"subject\":\"$uri\",\"eventTime\":\"2026-07-13T10:00:00.0000000Z\",\"data\":{\"operationName\":\"Microsoft.Compute/virtualMachines/write\",\"resourceUri\":\"$uri\",\"subscriptionId\":\"$sub\",\"status\":\"Succeeded\",\"claims\":{\"name\":\"e2e@contoso.com\"}}}]" \
            -o /dev/null
          python3 - <<'PY'
          import json, urllib.request
          def get(path):
              return json.load(urllib.request.urlopen(f"http://localhost:8000{path}"))
          # The delivery is logged...
          events = get("/api/events")
          assert any(e["event_id"] == "e2e-evt-1" for e in events), events
          # ...and it reactively created a mode='event' execution that succeeded.
          ev = [e for e in get("/api/policy-executions") if e.get("mode") == "event"]
          assert ev and ev[0]["status"] == "succeeded", ev
          print(f"event-mode e2e OK: {len(ev)} reactive execution(s), status={ev[0]['status']}")
          PY
      - name: Assert real-time AssetDB update from the event (M6.3)
        run: |
          set -euo pipefail
          # The same delivery streamed into the AssetDB: the VM asset now exists (active)
          # and its history has a 'created' event carrying the actor.
          python3 - <<'PY'
          import json, urllib.request
          def post(path, body):
              req = urllib.request.Request(
                  f"http://localhost:8000{path}", data=json.dumps(body).encode(),
                  headers={"Content-Type": "application/json"})
              return json.load(urllib.request.urlopen(req))
          def get(path):
              return json.load(urllib.request.urlopen(f"http://localhost:8000{path}"))
          assets = post("/api/assets/query", {})
          vm = [a for a in assets if a["resource_id"].endswith("/vm-web-01")]
          assert vm and vm[0]["state"] == "active", assets
          hist = get(f"/api/assets{vm[0]['resource_id']}/history")
          created = [h for h in hist if h["event_type"] == "created"]
          assert created and created[0]["data"].get("actor"), hist
          print(f"assetdb e2e OK: asset state={vm[0]['state']}, actor={created[0]['data']['actor']}")
          PY
      - name: Smoke-test custodian action executor (dry-run, M7.1)
        run: |
          set -euo pipefail
          # Resolve a policy's actions and dry-run one through the deployed backend
          # image. Dry-run makes ZERO Azure calls, so this is fully mock-safe.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.config import Settings
          from azure_finops.custodian import engine
          from azure_finops.remediation import executor
          spec = {"policies": [{"name": "p", "resource": "azure.vm",
                  "actions": ["stop", {"type": "tag", "tag": "cost-center", "value": "eng"}]}]}
          actions = engine.resolve_actions(spec)
          assert actions == [{"type": "stop"},
                             {"type": "tag", "tag": "cost-center", "value": "eng"}], actions
          vm = {"id": "/subscriptions/s/resourceGroups/rg/providers/"
                      "Microsoft.Compute/virtualMachines/vm-1",
                "type": "Microsoft.Compute/virtualMachines", "name": "vm-1"}
          res = executor.execute_action("delete", vm, settings=Settings(), dry_run=True)
          assert res["executed"] is False and res["dry_run"] is True, res
          print(f"custodian-actions e2e OK: resolved {len(actions)} action(s); {res['message']}")
          PY
      - name: Smoke-test policy-action approval workflow end to end (M7.2)
        run: |
          set -euo pipefail
          # Drive the approval state machine over HTTP against a real matched resource
          # (from the pull-mode run above): queue -> pending, approve -> terminal (guarded;
          # the demo env keeps REMEDIATION_ENABLED=false so it previews), reject -> rejected,
          # and the 404/409 edges.
          python3 - <<'PY'
          import json, urllib.request, urllib.error
          def _req(method, path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(
                  f"http://localhost:8000{path}", data=data, method=method,
                  headers={"Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.load(r)
              except urllib.error.HTTPError as e:
                  return e.code, None
          # A match id from the pull-mode execution seeded earlier.
          _, execs = _req("GET", "/api/policy-executions")
          _, matches = _req("GET", f"/api/policy-executions/{execs[0]['execution_id']}/matches")
          match_id = matches[0]["id"]
          # queue -> pending
          st, queued = _req("POST", f"/api/policy-matches/{match_id}/actions", {"action": "stop"})
          assert st == 200 and queued["status"] == "pending", (st, queued)
          aid = queued["action_id"]
          # approve -> leaves pending (guarded; previews since REMEDIATION_ENABLED=false)
          st, approved = _req("POST", f"/api/remediation/{aid}/approve")
          assert st == 200 and approved["status"] in ("executed", "dry_run"), (st, approved)
          # approving an already-decided action -> 409
          st, _ = _req("POST", f"/api/remediation/{aid}/approve")
          assert st == 409, st
          # a second action, rejected -> never executes
          _, q2 = _req("POST", f"/api/policy-matches/{match_id}/actions", {"action": "stop"})
          st, rej = _req("POST", f"/api/remediation/{q2['action_id']}/reject")
          assert st == 200 and rej["status"] == "rejected", (st, rej)
          # deciding an unknown action -> 404
          st, _ = _req("POST", "/api/remediation/99999999/approve")
          assert st == 404, st
          print(f"approval e2e OK: pending -> {approved['status']} (409 on re-approve); "
                f"second action -> rejected; unknown -> 404")
          PY
      - name: Smoke-test policy-action guardrails (M7.3)
        run: |
          set -euo pipefail
          # Exercise the block-by-default guardrails against the deployed backend
          # image: RG allow-list, exclude tags (finops + built-in custodian), the
          # action-type allow-list, and the dry-run default. Pure functions — zero
          # Azure calls, fully mock-safe.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.config import Settings
          from azure_finops.remediation import guardrails
          rid = ("/subscriptions/s/resourceGroups/rg-app/providers/"
                 "Microsoft.Compute/virtualMachines/vm-1")
          cfg = Settings(remediation_enabled=True, allowed_resource_groups="rg-app")
          assert guardrails.check(rid, {}, cfg).allowed, "allow-listed RG should pass"
          assert not guardrails.check(rid, {}, Settings(allowed_resource_groups="rg-other")).allowed
          assert not guardrails.check(rid, {"custodian": "exclude"},
                                      Settings(allowed_resource_groups="*")).allowed
          blocked = guardrails.check(rid, {}, Settings(allowed_resource_groups="*"),
                                     action="stop", allowed_actions=["tag"])
          assert not blocked.allowed and any("action type" in r for r in blocked.reasons), blocked
          # Dry-run default: unset guardrails force a preview; fully configured permits real exec.
          assert guardrails.default_dry_run(Settings(allowed_resource_groups="")) is True
          assert guardrails.default_dry_run(cfg) is False
          print("guardrails e2e OK: RG allow-list, exclude tag, action allow-list, dry-run default")
          PY
      - name: Smoke-test unified remediation audit end to end (M7.4)
        run: |
          set -euo pipefail
          # The M7.2 step queued policy actions against a matched resource; assert the
          # unified audit surfaces their provenance (source + policy_id) over HTTP and
          # that the source filter works. Fully mock-safe (read-only over the audit feed).
          python3 - <<'PY'
          import json, urllib.request
          def _get(path):
              with urllib.request.urlopen(f"http://localhost:8000{path}") as r:
                  return json.load(r)
          allrows = _get("/api/remediation")
          assert allrows, "expected audited policy actions from the M7.2 step"
          assert all(r.get("source") for r in allrows), allrows
          policy = _get("/api/remediation?source=policy")
          assert policy and all(r["source"] == "policy" for r in policy), policy
          assert policy[0]["policy_id"] is not None, policy[0]
          assert policy[0]["resource_id"], policy[0]  # surfaced from params, no recommendation
          assert _get("/api/remediation?source=nonesuch") == [], "unknown source filters to empty"
          print(f"audit e2e OK: {len(allrows)} attempt(s); {len(policy)} policy-sourced "
                f"(policy_id={policy[0]['policy_id']}); source filter works")
          PY
      - name: Assert UI routes render (assets M4.5 + account groups M5.1 + bindings M5.4 + events M6.4, mock mode)
        run: |
          set -euo pipefail
          # Wait for the Next.js server, then assert the explorer + a detail route
          # (catch-all id) and the account-groups page all return 200. Full Azure ids
          # contain slashes, so the detail route is /assets/<subscriptions/.../vm-web-01>.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/assets || true)
            if [ "$code" = "200" ]; then echo "frontend ready after ~$((i*2))s"; break; fi
            sleep 2
          done
          detail="/assets/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/rg-app/providers/microsoft.compute/virtualmachines/vm-web-01"
          for path in "/assets" "$detail" "/account-groups" "/bindings" "/events" "/remediation"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3001$path")
            test "$code" = "200" || { echo "::error::$path returned $code"; docker compose logs frontend; exit 1; }
            echo "route OK: $path → 200"
          done
      - name: Tear down
        if: always()
        run: docker compose down -v

  # --- Security: Trivy fs + image scans. Fails on any ACTIONABLE HIGH/CRITICAL #
  # No baseline / .trivyignore (no specific CVEs are waived). `--ignore-unfixed`
  # scopes the gate to vulnerabilities that HAVE an available fix: a single fixable
  # HIGH/CRITICAL blocks the build, while CVEs with no upstream patch (e.g. Debian
  # Essential packages perl-base / util-linux / ncurses, which can be neither
  # patched nor removed) don't fail a build nothing can act on. Everything fixable
  # is actually fixed (see backend/frontend Dockerfiles + requirements.txt).
  security:
    name: Security (Trivy — fail on any fixable HIGH/CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.72.0
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -C /usr/local/bin -xzf - trivy
          trivy --version
      - name: Build images to scan
        run: |
          docker build -t azure-finops-backend ./backend
          docker build -t azure-finops-frontend ./frontend
      # Warm the vuln DB once; subsequent scans reuse the cache.
      - name: Trivy filesystem scan (dependencies)
        run: |
          trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress .
      - name: Trivy image scan (backend)
        run: |
          trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress azure-finops-backend
      - name: Trivy image scan (frontend)
        run: |
          trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress azure-finops-frontend
