name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Lint + unit & DB-backed integration tests + coverage gate ----------- #
  backend:
    name: Backend (lint + unit/integration tests + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          # Apply the same c7n CVE overrides the image ships (issue #58), so the test
          # suite validates the cryptography/PyJWT versions we actually run.
          pip install --no-deps --upgrade -r backend/requirements-overrides-security.txt
      - name: Ruff (lint + format check)
        run: |
          ruff check backend
          ruff format --check backend
      # Docker is available on ubuntu-latest, so the testcontainers `db` fixture
      # spins up a real Postgres — this run covers unit AND DB-backed integration
      # tests. Coverage gate (fail_under=95) is enforced via pyproject.
      - name: Tests + coverage (unit + integration; fails under 95%)
        run: pytest backend/tests --cov=azure_finops --cov-report=term-missing

  # --- Build the Next.js app (tsc typecheck via next build) ---------------- #
  frontend:
    name: Frontend (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Build Next.js app
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # --- Build the whole solution as container images ------------------------ #
  build:
    name: Build images (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -t azure-finops-backend ./backend
      - name: Build frontend image
        run: docker build -t azure-finops-frontend ./frontend

  # --- End-to-end: boot the stack in mock mode and smoke-test the API ------ #
  e2e:
    name: End-to-end (docker compose, mock mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare env (mock mode)
        run: cp .env.example .env
      - name: Build backend + frontend images
        run: docker compose build backend frontend
      - name: Start stack (db + backend + frontend)
        run: docker compose up -d db backend frontend
      - name: Wait for the API to be ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)
            if [ "$code" = "200" ]; then echo "backend ready after ~$((i*2))s"; exit 0; fi
            sleep 2
          done
          echo "::error::backend did not become ready"; docker compose logs backend; exit 1
      - name: Smoke-test the pull-mode pipeline end to end
        run: |
          set -euo pipefail
          # No executions yet -> empty list (not an error).
          test "$(curl -s http://localhost:8000/api/policy-executions)" = "[]"
          # Seed a policy, then run pull-mode execution.
          curl -sf -X POST http://localhost:8000/api/policies \
            -H 'Content-Type: application/json' \
            -d '{"name":"e2e-vms","resource_type":"azure.vm","spec":{"policies":[{"name":"e2e-vms","resource":"azure.vm","actions":["stop"]}]}}' \
            -o /dev/null
          docker compose exec -T backend python -m azure_finops.cli run-policies --mock
          python3 - <<'PY'
          import json, urllib.request, urllib.error
          def get(path):
              return json.load(urllib.request.urlopen(f"http://localhost:8000{path}"))
          execs = get("/api/policy-executions")
          assert execs and execs[0]["status"] == "succeeded", execs
          matches = get(f"/api/policy-executions/{execs[0]['execution_id']}/matches")
          assert matches, "expected matched resources"
          # Governance health (M3.4) — assert only if the endpoint is present on this ref.
          try:
              health = get("/api/governance/policy-health")
              assert health and health[0]["total_executions"] >= 1, health
              extra = f", health total_matches={health[0]['total_matches']}"
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              extra = " (governance/policy-health absent on this ref)"
          print(f"e2e OK: {len(execs)} execution(s), {len(matches)} match(es){extra}")
          PY
      - name: Smoke-test event-mode enforcement end to end (M6.2)
        run: |
          set -euo pipefail
          # Seed an EVENT-MODE VM policy (declares a mode block), then deliver an
          # Event Grid ResourceWriteSuccess for a VM and assert it reactively fired.
          curl -sf -X POST http://localhost:8000/api/policies \
            -H 'Content-Type: application/json' \
            -d '{"name":"e2e-event-vms","resource_type":"azure.vm","spec":{"policies":[{"name":"e2e-event-vms","resource":"azure.vm","mode":{"type":"azure-event-grid","events":["Microsoft.Compute/virtualMachines/write"]},"actions":["stop"]}]}}' \
            -o /dev/null
          sub="00000000-0000-0000-0000-000000000000"
          uri="/subscriptions/$sub/resourceGroups/rg-app/providers/Microsoft.Compute/virtualMachines/vm-web-01"
          curl -sf -X POST http://localhost:8000/api/events/azure \
            -H 'Content-Type: application/json' \
            -d "[{\"id\":\"e2e-evt-1\",\"eventType\":\"Microsoft.Resources.ResourceWriteSuccess\",\"subject\":\"$uri\",\"eventTime\":\"2026-07-13T10:00:00.0000000Z\",\"data\":{\"operationName\":\"Microsoft.Compute/virtualMachines/write\",\"resourceUri\":\"$uri\",\"subscriptionId\":\"$sub\",\"status\":\"Succeeded\",\"claims\":{\"name\":\"e2e@contoso.com\"}}}]" \
            -o /dev/null
          python3 - <<'PY'
          import json, urllib.request
          def get(path):
              return json.load(urllib.request.urlopen(f"http://localhost:8000{path}"))
          # The delivery is logged...
          events = get("/api/events")
          assert any(e["event_id"] == "e2e-evt-1" for e in events), events
          # ...and it reactively created a mode='event' execution that succeeded.
          ev = [e for e in get("/api/policy-executions") if e.get("mode") == "event"]
          assert ev and ev[0]["status"] == "succeeded", ev
          print(f"event-mode e2e OK: {len(ev)} reactive execution(s), status={ev[0]['status']}")
          PY
      - name: Assert real-time AssetDB update from the event (M6.3)
        run: |
          set -euo pipefail
          # The same delivery streamed into the AssetDB: the VM asset now exists (active)
          # and its history has a 'created' event carrying the actor.
          python3 - <<'PY'
          import json, urllib.request
          def post(path, body):
              req = urllib.request.Request(
                  f"http://localhost:8000{path}", data=json.dumps(body).encode(),
                  headers={"Content-Type": "application/json"})
              return json.load(urllib.request.urlopen(req))
          def get(path):
              return json.load(urllib.request.urlopen(f"http://localhost:8000{path}"))
          assets = post("/api/assets/query", {})
          vm = [a for a in assets if a["resource_id"].endswith("/vm-web-01")]
          assert vm and vm[0]["state"] == "active", assets
          hist = get(f"/api/assets{vm[0]['resource_id']}/history")
          created = [h for h in hist if h["event_type"] == "created"]
          assert created and created[0]["data"].get("actor"), hist
          print(f"assetdb e2e OK: asset state={vm[0]['state']}, actor={created[0]['data']['actor']}")
          PY
      - name: Smoke-test custodian action executor (dry-run, M7.1)
        run: |
          set -euo pipefail
          # Resolve a policy's actions and dry-run one through the deployed backend
          # image. Dry-run makes ZERO Azure calls, so this is fully mock-safe.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.config import Settings
          from azure_finops.custodian import engine
          from azure_finops.remediation import executor
          spec = {"policies": [{"name": "p", "resource": "azure.vm",
                  "actions": ["stop", {"type": "tag", "tag": "cost-center", "value": "eng"}]}]}
          actions = engine.resolve_actions(spec)
          assert actions == [{"type": "stop"},
                             {"type": "tag", "tag": "cost-center", "value": "eng"}], actions
          vm = {"id": "/subscriptions/s/resourceGroups/rg/providers/"
                      "Microsoft.Compute/virtualMachines/vm-1",
                "type": "Microsoft.Compute/virtualMachines", "name": "vm-1"}
          res = executor.execute_action("delete", vm, settings=Settings(), dry_run=True)
          assert res["executed"] is False and res["dry_run"] is True, res
          print(f"custodian-actions e2e OK: resolved {len(actions)} action(s); {res['message']}")
          PY
      - name: Smoke-test policy-action approval workflow end to end (M7.2)
        run: |
          set -euo pipefail
          # Drive the approval state machine over HTTP against a real matched resource
          # (from the pull-mode run above): queue -> pending, approve -> terminal (guarded;
          # the demo env keeps REMEDIATION_ENABLED=false so it previews), reject -> rejected,
          # and the 404/409 edges.
          python3 - <<'PY'
          import json, urllib.request, urllib.error
          def _req(method, path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(
                  f"http://localhost:8000{path}", data=data, method=method,
                  headers={"Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.load(r)
              except urllib.error.HTTPError as e:
                  return e.code, None
          # A match id from the pull-mode execution seeded earlier.
          _, execs = _req("GET", "/api/policy-executions")
          _, matches = _req("GET", f"/api/policy-executions/{execs[0]['execution_id']}/matches")
          match_id = matches[0]["id"]
          # queue -> pending
          st, queued = _req("POST", f"/api/policy-matches/{match_id}/actions", {"action": "stop"})
          assert st == 200 and queued["status"] == "pending", (st, queued)
          aid = queued["action_id"]
          # approve -> leaves pending (guarded; previews since REMEDIATION_ENABLED=false)
          st, approved = _req("POST", f"/api/remediation/{aid}/approve")
          assert st == 200 and approved["status"] in ("executed", "dry_run"), (st, approved)
          # approving an already-decided action -> 409
          st, _ = _req("POST", f"/api/remediation/{aid}/approve")
          assert st == 409, st
          # a second action, rejected -> never executes
          _, q2 = _req("POST", f"/api/policy-matches/{match_id}/actions", {"action": "stop"})
          st, rej = _req("POST", f"/api/remediation/{q2['action_id']}/reject")
          assert st == 200 and rej["status"] == "rejected", (st, rej)
          # deciding an unknown action -> 404
          st, _ = _req("POST", "/api/remediation/99999999/approve")
          assert st == 404, st
          print(f"approval e2e OK: pending -> {approved['status']} (409 on re-approve); "
                f"second action -> rejected; unknown -> 404")
          PY
      - name: Smoke-test policy-action guardrails (M7.3)
        run: |
          set -euo pipefail
          # Exercise the block-by-default guardrails against the deployed backend
          # image: RG allow-list, exclude tags (finops + built-in custodian), the
          # action-type allow-list, and the dry-run default. Pure functions — zero
          # Azure calls, fully mock-safe.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.config import Settings
          from azure_finops.remediation import guardrails
          rid = ("/subscriptions/s/resourceGroups/rg-app/providers/"
                 "Microsoft.Compute/virtualMachines/vm-1")
          cfg = Settings(remediation_enabled=True, allowed_resource_groups="rg-app")
          assert guardrails.check(rid, {}, cfg).allowed, "allow-listed RG should pass"
          assert not guardrails.check(rid, {}, Settings(allowed_resource_groups="rg-other")).allowed
          assert not guardrails.check(rid, {"custodian": "exclude"},
                                      Settings(allowed_resource_groups="*")).allowed
          blocked = guardrails.check(rid, {}, Settings(allowed_resource_groups="*"),
                                     action="stop", allowed_actions=["tag"])
          assert not blocked.allowed and any("action type" in r for r in blocked.reasons), blocked
          # Dry-run default: unset guardrails force a preview; fully configured permits real exec.
          assert guardrails.default_dry_run(Settings(allowed_resource_groups="")) is True
          assert guardrails.default_dry_run(cfg) is False
          print("guardrails e2e OK: RG allow-list, exclude tag, action allow-list, dry-run default")
          PY
      - name: Smoke-test unified remediation audit end to end (M7.4)
        run: |
          set -euo pipefail
          # The M7.2 step queued policy actions against a matched resource; assert the
          # unified audit surfaces their provenance (source + policy_id) over HTTP and
          # that the source filter works. Fully mock-safe (read-only over the audit feed).
          python3 - <<'PY'
          import json, urllib.request
          def _get(path):
              with urllib.request.urlopen(f"http://localhost:8000{path}") as r:
                  return json.load(r)
          allrows = _get("/api/remediation")
          assert allrows, "expected audited policy actions from the M7.2 step"
          assert all(r.get("source") for r in allrows), allrows
          policy = _get("/api/remediation?source=policy")
          assert policy and all(r["source"] == "policy" for r in policy), policy
          assert policy[0]["policy_id"] is not None, policy[0]
          assert policy[0]["resource_id"], policy[0]  # surfaced from params, no recommendation
          assert _get("/api/remediation?source=nonesuch") == [], "unknown source filters to empty"
          print(f"audit e2e OK: {len(allrows)} attempt(s); {len(policy)} policy-sourced "
                f"(policy_id={policy[0]['policy_id']}); source filter works")
          PY
      - name: Smoke-test notification service & templates (M8.1)
        run: |
          set -euo pipefail
          # Persist a template + channel through the deployed backend image, render the
          # template from violation context in the SANDBOXED Jinja2 env, and dispatch the
          # rendered payload through a stub transport (no network). Also assert the sandbox
          # blocks a real escape attempt and a missing variable renders empty. Fully mock-safe.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.notify import service
          from azure_finops.storage import repository as repo
          from azure_finops.storage.db import session_scope

          class _StubTransport:
              def __init__(self): self.sent = []
              def send(self, *, target, subject, body, config):
                  self.sent.append({"target": target, "subject": subject, "body": body})
                  return {"ok": True}

          with session_scope() as s:
              tid = repo.create_notification_template(
                  s, name="e2e-violation",
                  subject="[{{ policy_name }}] {{ count }} violation(s)",
                  body="Policy {{ policy_name }} matched {{ resource_id }} ({{ count }} total).",
              )["id"]
              cid = repo.create_notification_channel(
                  s, name="e2e-webhook", transport="webhook", target="https://hooks.example/e2e",
              )["id"]

          transport = _StubTransport()
          ctx = service.build_violation_context(
              policy_name="stopped-vms", resource_ids=["/subscriptions/s/vm-1"])
          with session_scope() as s:
              res = service.notify(s, template_id=tid, channel_id=cid, context=ctx, transport=transport)

          assert res["dispatched"] is True, res
          sent = transport.sent[0]
          assert sent["target"] == "https://hooks.example/e2e", sent
          assert "stopped-vms" in sent["subject"] and "1 violation" in sent["subject"], sent
          assert "/subscriptions/s/vm-1" in sent["body"] and "(1 total)" in sent["body"], sent

          # Sandbox: a real escape attempt raises; a missing variable renders empty.
          try:
              service.render("{{ ''.__class__.__mro__[1].__subclasses__() }}", {})
              raise SystemExit("sandbox did NOT block the escape attempt")
          except service.SecurityError:
              pass
          assert service.render("Hello {{ missing }}!", {}) == "Hello !"

          # Clean up so the audit-only tables stay tidy for any later steps.
          with session_scope() as s:
              repo.delete_notification_channel(s, cid)
              repo.delete_notification_template(s, tid)
          print(f"notify e2e OK: dispatched to {sent['target']}; subject={sent['subject']!r}; "
                f"sandbox blocked escape; missing var rendered empty")
          PY

      - name: Smoke-test Slack & email transports (M8.2)
        run: |
          set -euo pipefail
          # Drive the real SlackTransport / EmailTransport inside the deployed backend image
          # with INJECTED clients (no network, no SMTP). Assert Slack POSTs the rendered
          # payload to the webhook, email builds a MIME message with the right to/subject/body,
          # a failing client is captured as {ok: false, error}, and missing config errors.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.notify.transports import SlackTransport, EmailTransport

          class _FakeResp:
              status_code = 200
          class _FakeHTTP:
              def __init__(self): self.calls = []
              def post(self, url, json): self.calls.append((url, json)); return _FakeResp()
          class _BoomHTTP:
              def post(self, url, json): raise RuntimeError("connection refused")
          class _FakeSMTP:
              def __init__(self): self.sent = []
              def send_message(self, msg): self.sent.append(msg)

          # Slack: POSTs the rendered payload to the webhook target.
          http = _FakeHTTP()
          res = SlackTransport(client=http).send(
              target="https://hooks.slack/e2e", subject="Idle VMs", body="3 idle", config={"channel": "#ops"})
          assert res["ok"] is True, res
          url, payload = http.calls[0]
          assert url == "https://hooks.slack/e2e", url
          assert payload == {"text": "*Idle VMs*\n3 idle", "channel": "#ops"}, payload

          # Email: builds a MIME message with the right to/subject/body/from.
          smtp = _FakeSMTP()
          res = EmailTransport(client=smtp).send(
              target="ops@example.com", subject="Disk full", body="Server X full.", config={"from": "finops@corp"})
          assert res["ok"] is True and res["target"] == "ops@example.com", res
          msg = smtp.sent[0]
          assert msg["To"] == "ops@example.com" and msg["Subject"] == "Disk full", dict(msg)
          assert msg["From"] == "finops@corp" and msg.get_content().strip() == "Server X full.", msg.get_content()

          # Failure is captured, never raised.
          fail = SlackTransport(client=_BoomHTTP()).send(target="https://x", subject="s", body="b", config={})
          assert fail["ok"] is False and "connection refused" in fail["error"], fail

          # Missing config (no webhook / no recipient) is a validation error.
          miss_slack = SlackTransport(client=_FakeHTTP()).send(target="", subject="s", body="b", config={})
          miss_email = EmailTransport(client=_FakeSMTP()).send(target="", subject="s", body="b", config={})
          assert miss_slack["ok"] is False and "webhook" in miss_slack["error"].lower(), miss_slack
          assert miss_email["ok"] is False and "recipient" in miss_email["error"].lower(), miss_email

          print("transports e2e OK: slack POSTed payload; email built MIME; failure captured; missing-config errored")
          PY

      - name: Smoke-test Teams, Jira & ServiceNow transports (M8.3)
        run: |
          set -euo pipefail
          # Drive the real Teams/Jira/ServiceNow transports inside the deployed backend
          # image with INJECTED HTTP clients (no network). Assert each builds the right
          # artifact request (Teams MessageCard, Jira issue, ServiceNow incident), returns
          # the created id, and captures an auth error (non-2xx) as {ok: false, error}.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.notify.transports import TeamsTransport, JiraTransport, ServiceNowTransport

          class _Resp:
              def __init__(self, status_code=200, payload=None):
                  self.status_code = status_code; self._p = payload or {}
              def json(self): return self._p
          class _HTTP:
              def __init__(self, status_code=200, payload=None):
                  self.calls = []; self._s = status_code; self._p = payload or {}
              def post(self, url, json): self.calls.append((url, json)); return _Resp(self._s, self._p)
          class _S:
              jira_base_url = "https://acme.atlassian.net"; jira_email = "b@a.io"
              jira_api_token = "t"; jira_project = "OPS"; jira_issue_type = "Task"
              servicenow_instance_url = "https://acme.service-now.com"
              servicenow_user = "u"; servicenow_password = "p"

          # Teams: MessageCard to the webhook.
          teams = _HTTP()
          r = TeamsTransport(client=teams).send(target="https://wh", subject="Idle VMs", body="3 idle", config={})
          assert r["ok"] is True, r
          _, card = teams.calls[0]
          assert card["@type"] == "MessageCard" and card["title"] == "Idle VMs" and card["text"] == "3 idle", card

          # Jira: create issue, return key.
          jira = _HTTP(status_code=201, payload={"key": "OPS-7", "id": "1007"})
          r = JiraTransport(client=jira, settings=_S()).send(target="OPS", subject="Idle VM", body="stop it", config={})
          assert r["ok"] is True and r["key"] == "OPS-7", r
          url, body = jira.calls[0]
          assert url == "https://acme.atlassian.net/rest/api/2/issue", url
          assert body["fields"]["summary"] == "Idle VM" and body["fields"]["project"] == {"key": "OPS"}, body

          # ServiceNow: create incident, return number.
          snow = _HTTP(status_code=201, payload={"result": {"number": "INC42", "sys_id": "s1"}})
          r = ServiceNowTransport(client=snow, settings=_S()).send(target="", subject="Disk full", body="80%", config={"urgency": "2"})
          assert r["ok"] is True and r["number"] == "INC42", r
          url, body = snow.calls[0]
          assert url == "https://acme.service-now.com/api/now/table/incident", url
          assert body["short_description"] == "Disk full" and body["urgency"] == "2", body

          # Auth error (403/401) captured, never raised.
          auth = TeamsTransport(client=_HTTP(status_code=403)).send(target="https://wh", subject="s", body="b", config={})
          assert auth["ok"] is False and auth["status_code"] == 403, auth

          print("enterprise transports e2e OK: teams card; jira issue OPS-7; servicenow INC42; auth error captured")
          PY

      - name: Smoke-test per-binding notify config & dispatch (M8.4)
        run: |
          set -euo pipefail
          # Through the deployed backend image: create a channel + template, attach them to
          # a binding, then dispatch a violation through an INJECTED transport (no network).
          # Assert a binding WITH a channel dispatches the rendered message and a binding
          # WITHOUT one dispatches nothing. Also exercise the channel/template CRUD + the
          # transport-validation (bad kind → rejected). Fully mock-safe; cleans up after.
          docker compose exec -T backend python - <<'PY'
          from azure_finops.notify import dispatch
          from azure_finops.storage import repository as repo
          from azure_finops.storage.db import session_scope

          class _Spy:
              def __init__(self): self.sent = []
              def send(self, *, target, subject, body, config):
                  self.sent.append({"target": target, "subject": subject, "body": body})
                  return {"ok": True}

          # registry maps a channel kind → the right transport class (and validates input).
          assert "slack" in dispatch.KNOWN_TRANSPORTS and "servicenow" in dispatch.KNOWN_TRANSPORTS
          from azure_finops.notify.transports import SlackTransport
          assert isinstance(dispatch.build_transport("slack"), SlackTransport)

          with session_scope() as s:
              cid = repo.create_collection(s, name="e2e-notify-coll")["id"]
              gid = repo.create_account_group(s, name="e2e-notify-grp")["id"]
              bid = repo.create_binding(s, collection_id=cid, account_group_id=gid)["id"]
              ch = repo.create_notification_channel(
                  s, name="e2e-notify-ch", transport="webhook", target="https://hooks.example/e2e")["id"]
              tid = repo.create_notification_template(
                  s, name="e2e-notify-tpl",
                  subject="[{{ policy_name }}] {{ count }} violation(s)",
                  body="{{ resource_id }} flagged ({{ count }} total).")["id"]
              repo.create_binding_notification(s, binding_id=bid, channel_id=ch, template_id=tid)

          spy = _Spy()
          with session_scope() as s:
              res = dispatch.dispatch_for_binding(
                  s, binding_id=bid, policy_name="idle-vms", resource_ids=["/vm/1"],
                  transport_factory=lambda name: spy)
          assert len(res) == 1 and res[0]["dispatched"] is True, res
          assert len(spy.sent) == 1 and "idle-vms" in spy.sent[0]["subject"], spy.sent
          assert "/vm/1" in spy.sent[0]["body"], spy.sent

          # A binding without a channel dispatches nothing.
          with session_scope() as s:
              gid2 = repo.create_account_group(s, name="e2e-notify-grp2")["id"]
              bid2 = repo.create_binding(s, collection_id=cid, account_group_id=gid2)["id"]
          spy2 = _Spy()
          with session_scope() as s:
              res2 = dispatch.dispatch_for_binding(
                  s, binding_id=bid2, policy_name="p", resource_ids=["/x"],
                  transport_factory=lambda name: spy2)
