[mutmut]
# Mutation-testing gate for the core governance modules (issue #52 / M13.2).
#
# Run from backend/ (the `mutation` CI job and `make mutation` cd here) so the
# mutated file paths (cloudwarden/...) match how the tests import them; mutmut
# derives a mutant's module name from its path relative to the CWD.
#
# source_paths copies the WHOLE package into mutmut's sandbox (imports resolve),
# while only_mutate restricts the mutations to the three core dirs. The test
# selection is an OFFLINE subset (DB-backed tests skip when testcontainers is
# absent, as in the CI job) so per-mutant runs stay fast.
source_paths=cloudwarden
only_mutate=
    cloudwarden/analysis/*
    cloudwarden/custodian/*
    cloudwarden/remediation/*
also_copy=
    tests
pytest_add_cli_args_test_selection=
    tests/test_analysis.py
    tests/test_custodian_engine.py
    tests/test_eventmode.py
    tests/test_remediation.py
    tests/test_policy_action_guardrails.py
pytest_add_cli_args=
    -p no:cacheprovider
