name: azure-finops

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops
      POSTGRES_DB: finops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops -d finops"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://finops:finops@db:5432/finops
      APP_DATA_DIR: /data
      # RBAC (M11.1): off by default; set these to enforce permissions on writes.
      RBAC_ENABLED: ${RBAC_ENABLED:-false}
      RBAC_BOOTSTRAP_ADMIN: ${RBAC_BOOTSTRAP_ADMIN:-}
      # SSO / OIDC (M11.3): off by default; enable with RBAC to protect the API.
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_PRINCIPAL_CLAIM: ${OIDC_PRINCIPAL_CLAIM:-sub}
      OIDC_PUBLIC_KEY: ${OIDC_PUBLIC_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"
    command: ["api"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/docs').status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    env_file: .env
    environment:
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Postgres datasource wiring for provisioning (read by datasources.yaml)
      FINOPS_DB_HOST: db:5432
      FINOPS_DB_NAME: finops
      FINOPS_DB_USER: finops
      FINOPS_DB_PASSWORD: finops
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  # Next.js UI (Phase 4). Part of the default stack — `docker compose up` starts it.
  frontend:
    build: ./frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  pgdata:
  appdata:
  grafana-data:
